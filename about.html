<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&display=swap" rel="stylesheet">
<title>裏側ストーリー</title>

<style>
body {
  font-family: 'Zen Kaku Gothic New', sans-serif;
}

/* セクション */
.section {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 40px;
}

/* 色 */
.dark {
  background: linear-gradient(135deg, #ff4fa3, #ff85c1);
  color: white;
}

.light {
  background: #fff;
}

.gray {
  background: #f0f0f0;
}

/* 文字 */
.text {
  font-size: 30px;
}
.dark .text {
  font-size: 44px;
  font-weight: 700;
  letter-spacing: 2px;
}
/* 画像 */
.section img {
  width: 250px;
  border-radius: 15px;
  margin-top: 20px;
}
h1 {
  font-family: 'Dela Gothic One', sans-serif;
  font-size: 64px;
  letter-spacing: 2px;
  color: white;

  /* 影でポップ感出す */
  text-shadow: 3px 3px 0px rgba(0,0,0,0.2);
}

</style>
</head>






<body>

<!-- タイトル -->
<section class="section dark">
  <div class="text">自己PR動画の裏側</div>
</section>

<!-- 撮影 -->
<section class="section light">
  <div class="text">
    正直、最初はどう撮ればいいか分かりませんでした。
  </div>
  <img src="photo1.jpg">
</section>

<section class="section gray">
  <div class="text">
    どうすれば自分の強みが伝わるのかを考え、<br>何度も構成を見直しました。
  </div>
  <img src="photo2.jpg">
</section>

<!-- 編集 -->
<section class="section light">
  <div class="text">
    何度も撮り直して、編集もやり直しました。
  </div>
  <img src="photo2.jpg">
</section>

<section class="section gray">
  <div class="text">
    話し方や表情も見直し、<br>より自然に伝わるよう工夫しました。
  </div>
  <img src="photo2.jpg">
</section>

<!-- 協力 -->
<section class="section light">
  <div class="text">
    試行錯誤を重ねる中で、伝え方を工夫することの大切さを学びました。
  </div>
  <img src="photo3.jpg">
</section>

<!-- 締め -->
<section class="section dark">
  <div class="text">
    「やってみる」から、すべてが始まりました。
  </div>
</section>

</body>
</html>
